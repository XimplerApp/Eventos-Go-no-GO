<!DOCTYPE html>
<html>
<head>
<title>Scorecard GO / NO-GO PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family: Arial; background:#0f172a; color:white; padding:20px;}
h1 {color:#38bdf8;}

.card {background:#1e293b; padding:20px; border-radius:10px; margin-bottom:20px;}

input, select {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:none;
}

button {
  padding:12px;
  background:#38bdf8;
  border:none;
  border-radius:6px;
  cursor:pointer;
  width:100%;
  margin-top:10px;
}

.kpi {font-size:18px; margin:6px 0;}
.green {color:#22c55e;}
.red {color:#ef4444;}
.yellow {color:#facc15;}
</style>
</head>

<body>

<h1>📊 Scorecard GO / NO-GO</h1>

<div class="card">
<h2>Datos del Evento</h2>

<input id="evento" placeholder="Nombre del evento">

<select id="tipo">
<option>Feria</option>
<option>Congreso</option>
<option>Día de Campo</option>
<option>Finca demostrativa</option>
</select>

<input id="cultivo" placeholder="Cultivo">
<input id="zona" placeholder="Zona">
<input id="publico" placeholder="Público objetivo">
<input id="objetivo" placeholder="Objetivo comercial">
<input id="leads" placeholder="Leads esperados">

<select id="formato">
<option>Stand</option>
<option>Lobby estratégico</option>
<option>Conferencia técnica</option>
<option>Visita privada</option>
</select>
</div>

<div class="card">
<h2>Matriz de Evaluación</h2>

<input id="alineacion">
<input id="audiencia">
<input id="inventario">
<input id="timing">
<input id="roiScore">
<input id="seguimiento">
</div>

<div class="card">
<h2>Costeo</h2>

<input id="stand">
<input id="viaticos">
<input id="muestras">

<input id="horasTecnico">
<input id="costoHoraTecnico">

<input id="horasComercial">
<input id="costoHoraComercial">

<input id="costoOportunidad">
<input id="seguimientoCosto">
<input id="captacion">
</div>

<div class="card">
<h2>Proyección</h2>
<input id="ventas">
</div>

<button onclick="calcular()">🚀 Evaluar</button>
<button onclick="exportar()">📤 Exportar Evaluaciones</button>

<div id="resultado"></div>

<script>

function num(id){
  let val = document.getElementById(id).value;
  if(!val) return 0;
  return parseFloat(val.replace(/,/g,'')) || 0;
}

function calcular(){

let alineacion = Math.min(num("alineacion"),20);
let audiencia = Math.min(num("audiencia"),20);
let inventario = Math.min(num("inventario"),15);
let timing = Math.min(num("timing"),15);
let roiScore = Math.min(num("roiScore"),20);
let seguimiento = Math.min(num("seguimiento"),10);

let totalScore = alineacion + audiencia + inventario + timing + roiScore + seguimiento;

let costo =
num("stand") +
num("viaticos") +
num("muestras") +
(num("horasTecnico") * num("costoHoraTecnico")) +
(num("horasComercial") * num("costoHoraComercial")) +
num("costoOportunidad") +
num("seguimientoCosto") +
num("captacion");

let ventasVal = num("ventas");
let leads = num("leads");

let roi = costo ? (ventasVal - costo) / costo : 0;
let cpl = leads ? costo / leads : 0;

let tipoEvento = tipo.value;
let roiMin = tipoEvento === "Finca demostrativa" ? 0.4 : 0.3;

let scoreOK = totalScore >= 75;
let roiOK = roi >= roiMin;

let alerta = "";
if(ventasVal === 0) alerta = "Ventas en 0";
else if(leads <= 0) alerta = "Sin leads";
else if(cpl > 5000) alerta = "CPL alto";

resultado.innerHTML = `
<div class="card">
<div class="kpi">Score: ${totalScore}/100 ${scoreOK ? "GO ✅" : "NO GO ❌"}</div>
<div class="kpi">💸 $${costo.toLocaleString()}</div>
<div class="kpi">💰 $${ventasVal.toLocaleString()}</div>
<div class="kpi">ROI: ${(roi*100).toFixed(2)}%</div>
<div class="kpi">📊 Leads: ${leads}</div>
<div class="kpi">💰 CPL: $${cpl.toLocaleString()}</div>
<div class="kpi">💵 Ticket: $${leads ? (ventasVal/leads).toLocaleString() : 0}</div>
<div class="kpi ${roiOK?'green':'red'}">${roiOK?"✔ ROI cumple":"❌ ROI no cumple"}</div>
<div class="kpi yellow">${alerta}</div>
</div>
`;

let eventos = JSON.parse(localStorage.getItem("eventos")) || [];

eventos.push({
fecha: new Date().toLocaleString(),
evento: evento.value,
tipo: tipo.value,
score: totalScore,
ventas: ventasVal,
costo,
roi,
leads,
cpl,
ticket: leads ? (ventasVal / leads) : 0
});

localStorage.setItem("eventos", JSON.stringify(eventos));
}

function exportar(){

let eventos = JSON.parse(localStorage.getItem("eventos")) || [];
if(eventos.length === 0) return alert("No hay datos");

let headers = ["fecha","evento","tipo","score","ventas","costo","roi","leads","cpl","ticket"];
let csv = headers.join(",") + "\n";

eventos.forEach(e => {

let row = headers.map(h => {

let val = e[h];

if(h === "roi") val = (val*100).toFixed(2)+"%";
else if(["ventas","costo","cpl","ticket"].includes(h)) val = Number(val).toLocaleString();

return `"${val}"`;

});

csv += row.join(",") + "\n";

});

let blob = new Blob([csv], { type: 'text/csv' });
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "eventos.csv";
a.click();
}

</script>

</body>
</html>
