<!DOCTYPE html>
<html>
<head>
<title>Scorecard GO / NO-GO PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family: Arial; background:#0f172a; color:white; padding:20px;}
h1 {color:#38bdf8;}

.card {background:#1e293b; padding:20px; border-radius:10px; margin-bottom:20px;}

input, select {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:none;
}

button {
  padding:12px;
  background:#38bdf8;
  border:none;
  border-radius:6px;
  cursor:pointer;
  width:100%;
  margin-top:10px;
}

.kpi {font-size:18px; margin:6px 0;}
.green {color:#22c55e;}
.red {color:#ef4444;}
.yellow {color:#facc15;}
</style>
</head>

<body>

<h1>📊 Scorecard GO / NO-GO</h1>

<!-- DATOS -->
<div class="card">
<h2>Datos del Evento</h2>

<input id="evento" placeholder="Nombre del evento">

<select id="tipo">
<option>Feria</option>
<option>Congreso</option>
<option>Día de Campo</option>
<option>Finca demostrativa</option>
</select>

<input id="cultivo" placeholder="Cultivo">
<input id="zona" placeholder="Zona">
<input id="publico" placeholder="Público objetivo">
<input id="objetivo" placeholder="Objetivo comercial">
<input id="leads" placeholder="Leads esperados">

<select id="formato">
<option>Stand</option>
<option>Lobby estratégico</option>
<option>Conferencia técnica</option>
<option>Visita privada</option>
</select>
</div>

<!-- SCORE -->
<div class="card">
<h2>Matriz de Evaluación (0-20)</h2>

<input id="alineacion" placeholder="Alineación estratégica">
<input id="audiencia" placeholder="Audiencia calificada">
<input id="inventario" placeholder="Inventario disponible">
<input id="timing" placeholder="Timing comercial">
<input id="roiScore" placeholder="ROI esperado">
<input id="seguimiento" placeholder="Capacidad seguimiento">
</div>

<!-- COSTOS -->
<div class="card">
<h2>Costeo del Evento</h2>

<input id="stand" placeholder="Stand / renta">
<input id="viaticos" placeholder="Viáticos">
<input id="muestras" placeholder="Muestras">

<input id="horasTecnico" placeholder="Horas técnico">
<input id="costoHoraTecnico" placeholder="Costo hora técnico">

<input id="horasComercial" placeholder="Horas comercial">
<input id="costoHoraComercial" placeholder="Costo hora comercial">

<input id="costoOportunidad" placeholder="Costo oportunidad">
<input id="seguimientoCosto" placeholder="Seguimiento">
<input id="captacion" placeholder="Captación / marketing">
</div>

<!-- INGRESOS -->
<div class="card">
<h2>Proyección Comercial</h2>

<input id="ventas" placeholder="Ventas esperadas">
</div>

<button onclick="calcular()">🚀 Evaluar Evento</button>

<div id="resultado"></div>

<script>

// FUNCIÓN LIMPIA DE NÚMEROS (SOLUCIÓN CLAVE)
function num(id){
  let val = document.getElementById(id).value;
  if(!val) return 0;
  return parseFloat(val.replace(/,/g,'')) || 0;
}

function calcular(){

// SCORE
let totalScore =
num("alineacion") +
num("audiencia") +
num("inventario") +
num("timing") +
num("roiScore") +
num("seguimiento");

// COSTO TOTAL
let costo =
num("stand") +
num("viaticos") +
num("muestras") +
(num("horasTecnico") * num("costoHoraTecnico")) +
(num("horasComercial") * num("costoHoraComercial")) +
num("costoOportunidad") +
num("seguimientoCosto") +
num("captacion");

// INGRESOS
let ventasVal = num("ventas");

// LEADS
let leads = num("leads");

// ROI
let roi = costo ? (ventasVal - costo) / costo : 0;

// CPL
let cpl = leads ? costo / leads : 0;

// TIPO EVENTO
let tipoEvento = tipo.value;

// ROI mínimo por tipo
let roiMin = 0.3;
if(tipoEvento === "Finca demostrativa") roiMin = 0.4;

// DECISIONES
let scoreOK = totalScore >= 75;
let roiOK = roi >= roiMin;

let decision = scoreOK ? "GO ✅" : "NO GO ❌";
let colorScore = scoreOK ? "green" : "red";

// ALERTAS INTELIGENTES
let alerta = "";

if(ventasVal === 0){
  alerta = "⚠️ Ventas en 0 → ROI inválido";
}
else if(leads <= 0){
  alerta = "⚠️ Sin leads → evento no medible";
}
else if(cpl > 5000){
  alerta = "⚠️ CPL alto → revisar eficiencia";
}
else if((ventasVal / leads) > 1000000){
  alerta = "⚠️ Ticket por lead extremadamente alto";
}

// RESULTADO
resultado.innerHTML = `

<div class="card">

<h2>Resultado</h2>

<div class="kpi">📊 Score: ${totalScore}/100</div>
<div class="kpi ${colorScore}"><b>${decision}</b></div>

<hr>

<div class="kpi">💸 Costo total: $${costo.toLocaleString()}</div>
<div class="kpi">💰 Ventas esperadas: $${ventasVal.toLocaleString()}</div>

<div class="kpi ${roiOK?'green':'red'}">
ROI: ${(roi*100).toFixed(2)}%
</div>

<div class="kpi">
ROI mínimo requerido: ${(roiMin*100)}%
</div>

<hr>

<div class="kpi">📊 Leads: ${leads}</div>
<div class="kpi">💰 CPL: $${cpl.toFixed(2)}</div>

<div class="kpi">
💵 Ticket por lead: $${leads ? (ventasVal/leads).toLocaleString() : 0}
</div>

<hr>

<div class="kpi ${roiOK?'green':'red'}">
${roiOK ? "✔ ROI cumple" : "❌ ROI no cumple"}
</div>

<div class="kpi yellow">${alerta}</div>

</div>
`;

// GUARDAR
let eventos = JSON.parse(localStorage.getItem("eventos")) || [];

eventos.push({
id: Date.now(),
evento: evento.value,
tipo: tipoEvento,
score: totalScore,
roi,
costo,
ventas: ventasVal,
leads,
cpl,
decision,
fecha: new Date().toLocaleString()
});

localStorage.setItem("eventos", JSON.stringify(eventos));

}

</script>

</body>
</html>
