<!DOCTYPE html>
<html>
<head>
<title>Scorecard GO / NO-GO PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family: Arial; background:#0f172a; color:white; padding:20px;}
h1 {color:#38bdf8;}

.card {background:#1e293b; padding:20px; border-radius:10px; margin-bottom:20px;}

input, select {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:none;
}

button {
  padding:12px;
  background:#38bdf8;
  border:none;
  border-radius:6px;
  cursor:pointer;
  width:100%;
  margin-top:10px;
}

.kpi {font-size:18px; margin:6px 0;}
.green {color:#22c55e;}
.red {color:#ef4444;}
.yellow {color:#facc15;}
</style>
</head>

<body>

<h1>📊 Scorecard GO / NO-GO</h1>

<!-- DATOS -->
<div class="card">
<h2>Datos del Evento</h2>

<input id="evento" placeholder="Nombre del evento">

<select id="tipo">
<option>Feria</option>
<option>Congreso</option>
<option>Día de Campo</option>
<option>Finca demostrativa</option>
</select>

<input id="cultivo" placeholder="Cultivo">
<input id="zona" placeholder="Zona">
<input id="publico" placeholder="Público objetivo">
<input id="objetivo" placeholder="Objetivo comercial">
<input id="leads" placeholder="Leads esperados">

<select id="formato">
<option>Stand</option>
<option>Lobby estratégico</option>
<option>Conferencia técnica</option>
<option>Visita privada</option>
</select>
</div>

<!-- SCORE -->
<div class="card">
<h2>Matriz de Evaluación</h2>

<input id="alineacion" placeholder="Alineación (0-20)">
<input id="audiencia" placeholder="Audiencia (0-20)">
<input id="inventario" placeholder="Inventario (0-15)">
<input id="timing" placeholder="Timing (0-15)">
<input id="roiScore" placeholder="ROI esperado (0-20)">
<input id="seguimiento" placeholder="Seguimiento (0-10)">
</div>

<!-- COSTOS -->
<div class="card">
<h2>Costeo</h2>

<input id="stand" placeholder="Stand">
<input id="viaticos" placeholder="Viáticos">
<input id="muestras" placeholder="Muestras">

<input id="horasTecnico" placeholder="Horas técnico">
<input id="costoHoraTecnico" placeholder="Costo hora técnico">

<input id="horasComercial" placeholder="Horas comercial">
<input id="costoHoraComercial" placeholder="Costo hora comercial">

<input id="costoOportunidad" placeholder="Costo oportunidad">
<input id="seguimientoCosto" placeholder="Seguimiento">
<input id="captacion" placeholder="Captación">
</div>

<!-- INGRESOS -->
<div class="card">
<h2>Proyección</h2>

<input id="ventas" placeholder="Ventas esperadas">
</div>

<button onclick="calcular()">🚀 Evaluar</button>
<button onclick="exportar()">📤 Exportar Evaluaciones</button>

<div id="resultado"></div>

<script>

// FUNCIÓN LIMPIA
function num(id){
  let val = document.getElementById(id).value;
  if(!val) return 0;
  return parseFloat(val.replace(/,/g,'')) || 0;
}

function calcular(){

// ===== SCORE =====
let alineacion = Math.min(num("alineacion"),20);
let audiencia = Math.min(num("audiencia"),20);
let inventario = Math.min(num("inventario"),15);
let timing = Math.min(num("timing"),15);
let roiScore = Math.min(num("roiScore"),20);
let seguimiento = Math.min(num("seguimiento"),10);

let totalScore = alineacion + audiencia + inventario + timing + roiScore + seguimiento;

// ===== COSTO =====
let costo =
num("stand") +
num("viaticos") +
num("muestras") +
(num("horasTecnico") * num("costoHoraTecnico")) +
(num("horasComercial") * num("costoHoraComercial")) +
num("costoOportunidad") +
num("seguimientoCosto") +
num("captacion");

// ===== INGRESOS =====
let ventasVal = num("ventas");
let leads = num("leads");

// ===== ROI =====
let roi = costo ? (ventasVal - costo) / costo : 0;

// ===== CPL =====
let cpl = leads ? costo / leads : 0;

// ===== ROI mínimo =====
let tipoEvento = tipo.value;
let roiMin = 0.3;
if(tipoEvento === "Finca demostrativa") roiMin = 0.4;

// ===== DECISION =====
let scoreOK = totalScore >= 75;
let roiOK = roi >= roiMin;

let decision = scoreOK ? "GO" : "NO GO";
let colorScore = scoreOK ? "green" : "red";

// ===== ALERTAS =====
let alerta = "";

if(ventasVal === 0){
  alerta = "Ventas en 0";
}
else if(leads <= 0){
  alerta = "Sin leads";
}
else if(cpl > 5000){
  alerta = "CPL alto";
}
else if((ventasVal / leads) > 1000000){
  alerta = "Evento estratégico (alto valor)";
}

// ===== RESULTADO UI =====
resultado.innerHTML = `
<div class="card">

<div class="kpi">
Score: ${totalScore}/100 ${scoreOK ? "GO ✅" : "NO GO ❌"}
</div>

<div class="kpi">💸 Costo total: $${costo.toLocaleString()}</div>
<div class="kpi">💰 Ventas esperadas: $${ventasVal.toLocaleString()}</div>

<div class="kpi">
ROI: ${(roi*100).toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2})}%
</div>

<div class="kpi">
ROI mínimo requerido: ${(roiMin*100)}%
</div>

<div class="kpi">📊 Leads: ${leads}</div>

<div class="kpi">
💰 CPL: $${cpl.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2})}
</div>

<div class="kpi">
💵 Ticket por lead: $${leads ? (ventasVal/leads).toLocaleString() : 0}
</div>

<div class="kpi ${roiOK?'green':'red'}">
${roiOK ? "✔ ROI cumple" : "❌ ROI no cumple"}
</div>

<div class="kpi yellow">
${alerta ? "⚠️ " + alerta : ""}
</div>

</div>
`;

// ===== GUARDAR =====
let eventos = JSON.parse(localStorage.getItem("eventos")) || [];

eventos.push({
fecha: new Date().toLocaleString(),
evento: evento.value,
tipo: tipoEvento,
cultivo: cultivo.value,
zona: zona.value,
publico: publico.value,
objetivo: objetivo.value,
formato: formato.value,

score: totalScore,
decision,

ventas: ventasVal,
costo,
roi,
leads,
cpl,
ticket: leads ? (ventasVal / leads) : 0,

alineacion,
audiencia,
inventario,
timing,
roiScore,
seguimiento
});

localStorage.setItem("eventos", JSON.stringify(eventos));

}

// ===== EXPORTAR CSV =====
function exportar(){

let eventos = JSON.parse(localStorage.getItem("eventos")) || [];

if(eventos.length === 0){
  alert("No hay datos");
  return;
}

// ORDEN DEFINIDO (FUENTE DE VERDAD)
let headers = [
"fecha","evento","tipo","cultivo","zona","publico","objetivo","formato",
"score","decision",
"ventas","costo","roi","leads","cpl","ticket",
"alineacion","audiencia","inventario","timing","roiScore","seguimiento"
];

// ENCABEZADOS
let csv = headers.join(",") + "\n";

// FILAS
eventos.forEach(e => {

let row = headers.map(h => {

let val = e[h];

// ===== FORMATEOS =====

// ROI → porcentaje
if(h === "roi" && val !== undefined){
  val = (val * 100).toLocaleString(undefined,{
    minimumFractionDigits:2,
    maximumFractionDigits:2
  }) + "%";
}

// ticket → separador de miles
  else if(h === "ticket"){
  val = Number(val).toLocaleString();
}

// números grandes → separador de miles
else if(
  h === "ventas" ||
  h === "costo" ||
  h === "cpl"
){
  val = Number(val).toLocaleString();
}

// proteger formato CSV (muy importante)
return `"${val ?? ""}"`;
}

return val ?? "";

});

csv += row.join(",") + "\n";

});

// DESCARGA
let blob = new Blob([csv], { type: 'text/csv' });
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "eventos_galera.csv";
a.click();

}

</script>

</body>
</html>
