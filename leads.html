<!DOCTYPE html>
<html>
<head>
<title>Leads de Eventos</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {font-family: Arial; background:#0f172a; color:white; padding:20px;}
h1 {color:#38bdf8;}

.card {background:#1e293b; padding:20px; border-radius:10px; margin-bottom:20px;}

input, select {
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:6px;
    border:none;
}

button {
    padding:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.save {background:#22c55e;}
.delete {background:#ef4444;}
.export {background:#22c55e;}

.kpi {font-size:18px; margin:5px 0;}
.green {color:#22c55e;}
.red {color:#ef4444;}

table {
    width:100%;
    border-collapse: collapse;
    text-align:center;
}

th, td {
    padding:10px;
    border-bottom:1px solid #334155;
}
</style>
</head>

<body>

<!-- HEADER -->
<div style="display:flex; gap:10px; margin-bottom:20px;">
  <a href="index.html"><button>📋 Ensayos</button></a>
  <a href="leads.html"><button>📞 Leads</button></a>
</div>

<h1>📞 Leads de Eventos</h1>

<!-- FORM -->
<div class="card">

<h2>Nuevo Lead</h2>

<select id="evento"></select>

<input id="nombre" placeholder="Nombre productor">
<input id="telefono" placeholder="Teléfono">
<input id="correo" placeholder="Correo">

<input id="cultivo" placeholder="Cultivo">
<input id="hectareas" placeholder="Hectáreas estimadas">
<input id="variedad" placeholder="Variedad actual">

<select id="interes">
<option>Ensayo</option>
<option>Compra directa</option>
<option>Cotización</option>
</select>

<input id="ticket" placeholder="Ticket estimado $">
<input id="proximo" placeholder="Próximo paso">

<input id="responsable" placeholder="Responsable comercial">

<label>Fecha 1er contacto</label>
<input type="date" id="fecha1">

<label>Fecha 2do contacto</label>
<input type="date" id="fecha2">

<button class="save" onclick="guardar()">Guardar Lead</button>

</div>

<!-- KPI -->
<div class="card">
<h2>📊 KPI Leads</h2>
<div id="kpis"></div>
</div>

<!-- TABLA -->
<div class="card">

<button class="export" onclick="exportarExcel()">📊 Exportar</button>

<table id="tabla"></table>

</div>

<script>

let leads = JSON.parse(localStorage.getItem("leads")) || [];
let eventos = JSON.parse(localStorage.getItem("eventos")) || [];

// ===== FUNCIÓN NUMEROS (FIX COMAS) =====
function num(valor){
    if(!valor) return 0;
    return parseFloat(valor.replace(/,/g,'')) || 0;
}

// ===== CARGAR EVENTOS =====
function cargarEventos(){

    let select = document.getElementById("evento");

    select.innerHTML = "";

    if(eventos.length === 0){
        select.innerHTML = `<option>No hay eventos</option>`;
        return;
    }

    eventos.forEach(e => {

        let texto = `${e.evento} | ${e.cultivo} | ${e.zona}`;

        select.innerHTML += `
        <option value="${e.id ? e.id : e.evento}">
        ${texto}
        </option>
        `;
    });
}

// ===== GUARDAR =====
function guardar(){

    let eventoId = document.getElementById("evento").value;

    let eventoSeleccionado = eventos.find(e =>
        String(e.id) === String(eventoId) ||
        String(e.evento) === String(eventoId)
    );

    let data = {
        id: Date.now(),
        evento_id: eventoId,
        evento_nombre: eventoSeleccionado ? eventoSeleccionado.evento : "Evento no encontrado",

        nombre: nombre.value,
        telefono: telefono.value,
        correo: correo.value,
        cultivo: cultivo.value,

        hectareas: num(hectareas.value),
        variedad: variedad.value,
        interes: interes.value,

        ticket: num(ticket.value),

        proximo: proximo.value,
        responsable: responsable.value,
        fecha1: fecha1.value,
        fecha2: fecha2.value,

        fecha: new Date().toLocaleString()
    };

    leads.push(data);
    localStorage.setItem("leads", JSON.stringify(leads));

    limpiar();
    render();
}

// ===== KPI =====
function calcularKPIs(){

    let total = leads.length;

    let con2Toques = leads.filter(l => l.fecha1 && l.fecha2).length;

    let porcentaje = total ? (con2Toques / total) * 100 : 0;

    let clase = porcentaje >= 90 ? "green" : "red";

    kpis.innerHTML = `
    <div class="kpi">Total Leads: ${total}</div>
    <div class="kpi ${clase}">% Leads con 2 toques: ${porcentaje.toFixed(2)}%</div>
    `;
}

// ===== RENDER =====
function render(){

    tabla.innerHTML = `
    <tr>
    <th>Evento</th>
    <th>Nombre</th>
    <th>Cultivo</th>
    <th>Interés</th>
    <th>Ticket</th>
    <th>1er toque</th>
    <th>2do toque</th>
    <th></th>
    </tr>
    `;

    leads.slice().reverse().forEach(l=>{

        tabla.innerHTML += `
        <tr>
        <td>${l.evento_nombre}</td>
        <td>${l.nombre}</td>
        <td>${l.cultivo}</td>
        <td>${l.interes}</td>
        <td>$${Number(l.ticket).toLocaleString()}</td>
        <td>${l.fecha1 || "-"}</td>
        <td>${l.fecha2 || "-"}</td>
        <td><button class="delete" onclick="eliminar(${l.id})">🗑</button></td>
        </tr>
        `;
    });

    calcularKPIs();
}

// ===== ELIMINAR =====
function eliminar(id){

    leads = leads.filter(l=>l.id != id);
    localStorage.setItem("leads", JSON.stringify(leads));

    render();
}

// ===== EXPORT =====
function exportarExcel(){

    let data = leads.map(l => ({

        "Evento": l.evento_nombre,
        "Nombre": l.nombre,
        "Teléfono": l.telefono,
        "Correo": l.correo,
        "Cultivo": l.cultivo,

        "Hectáreas": Number(l.hectareas).toLocaleString(),
        "Variedad": l.variedad,
        "Interés": l.interes,

        "Ticket": Number(l.ticket).toLocaleString(),

        "Responsable": l.responsable,
        "Fecha 1er contacto": l.fecha1,
        "Fecha 2do contacto": l.fecha2

    }));

    let ws = XLSX.utils.json_to_sheet(data);
    let wb = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(wb, ws, "Leads");

    XLSX.writeFile(wb, "Leads_Eventos.xlsx");
}

// ===== LIMPIAR =====
function limpiar(){
    document.querySelectorAll("input").forEach(i=>i.value="");
}

// ===== INIT =====
cargarEventos();
render();

</script>

</body>
</html>
