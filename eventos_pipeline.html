<!DOCTYPE html>
<html>
<head>
<title>Eventos → Pipeline → Cobro (Integrado)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family: Arial; background:#0f172a; color:white; padding:20px;}
h1 {color:#38bdf8;}

.card {background:#1e293b; padding:20px; border-radius:10px; margin-bottom:20px;}

select, input {
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:6px;
    border:none;
}

button {
    padding:8px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.save {background:#22c55e;}
.delete {background:#ef4444;}

.kpi {margin:5px 0;}

.green {color:#22c55e;}
.red {color:#ef4444;}
.yellow {color:#facc15;}

table {
    width:100%;
    border-collapse: collapse;
    text-align:center;
}

th, td {
    padding:10px;
    border-bottom:1px solid #334155;
}
</style>
</head>

<body>

<h1>🚀 EVENTOS → PIPELINE → COBRO</h1>

<!-- ================= EVENTO SELECT ================= -->
<div class="card">
<h2>🎯 Seleccionar Evento</h2>

<select id="eventoSelect" onchange="renderTodo()"></select>

</div>

<!-- ================= KPIs EVENTO ================= -->
<div class="card">
<h2>📊 KPIs del Evento</h2>
<div id="kpis"></div>
</div>

<!-- ================= PIPELINE ================= -->
<div class="card">
<h2>📈 Pipeline (automático desde Leads)</h2>
<table id="tablaPipeline"></table>
</div>

<!-- ================= COBRANZA ================= -->
<div class="card">
<h2>💰 Cobranza</h2>

<input id="cliente" placeholder="Cliente">
<input id="monto" placeholder="Monto">
<input id="dias" placeholder="Días vencidos">

<button class="save" onclick="guardarCobro()">Agregar</button>

<div id="kpisCobro"></div>
    
<button onclick="exportarCSV()">📤 Exportar CSV</button>
    
<table id="tablaCobro"></table>

</div>

<script>

// ===== DATA GLOBAL =====
let eventos = JSON.parse(localStorage.getItem("eventos")) || [];
let leads = JSON.parse(localStorage.getItem("leads")) || [];
let cobranza = JSON.parse(localStorage.getItem("cobranza")) || [];

// ===== HELPERS NUMÉRICOS =====
function num(valor){
    if(!valor) return 0;
    return parseFloat(valor.replace(/,/g,'')) || 0;
}
    function formatearNumero(input){
    let valor = input.value.replace(/,/g,'');
    if(!isNaN(valor) && valor !== ""){
        input.value = Number(valor).toLocaleString();
    }
}
// ===== CARGAR EVENTOS =====
function cargarEventos(){

eventoSelect.innerHTML = "";

eventos.forEach(e=>{
eventoSelect.innerHTML += `
<option value="${e.id}">
${e.evento} | ${e.cultivo} | ${e.zona}
</option>`;
});

}

// ===== FILTRAR LEADS POR EVENTO =====
function getLeadsEvento(){

let id = eventoSelect.value;

return leads.filter(l =>
String(l.evento_id) === String(id)
);

}

// ===== PIPELINE AUTOMÁTICO =====
function renderPipeline(){

let data = getLeadsEvento();

let etapas = {
"Lead":0,
"Contactado":0,
"Cotización":0,
"Orden":0
};

let montoPipeline = 0;
let ventas = 0;

data.forEach(l=>{

let estado = l.interes || "Lead";

if(etapas[estado] !== undefined){
etapas[estado]++;
}

montoPipeline += l.ticket || 0;

if(estado === "Orden"){
ventas += l.ticket || 0;
}

});

// TABLA
tablaPipeline.innerHTML = `
<tr>
<th>Etapa</th>
<th>#</th>
</tr>
`;

Object.keys(etapas).forEach(e=>{
tablaPipeline.innerHTML += `
<tr>
<td>${e}</td>
<td>${etapas[e]}</td>
</tr>
`;
});

return {etapas, montoPipeline, ventas};

}

// ===== KPIs =====
function renderKPIs(){

let evento = eventos.find(e => String(e.id) === String(eventoSelect.value));

if(!evento) return;

let data = getLeadsEvento();

let totalLeads = data.length;

let pipelineData = renderPipeline();

let ordenes = pipelineData.etapas["Orden"] || 0;

let conversion = totalLeads ? (ordenes / totalLeads)*100 : 0;

let cpl = totalLeads ? evento.costo / totalLeads : 0;

let roi = evento.costo ? (pipelineData.ventas - evento.costo) / evento.costo : 0;

kpis.innerHTML = `
<div class="kpi">Leads: ${totalLeads}</div>
<div class="kpi">Pipeline: $${pipelineData.montoPipeline.toLocaleString()}</div>
<div class="kpi">Ventas (Órdenes): $${pipelineData.ventas.toLocaleString()}</div>

<div class="kpi ${conversion>=20?'green':'red'}">
Conversión: ${conversion.toFixed(2)}%
</div>

<div class="kpi ${cpl<=1500?'green':'red'}">
CPL: $${cpl.toLocaleString()}
</div>

<div class="kpi ${roi>=0.3?'green':'red'}">
ROI: ${(roi*100).toFixed(2)}%
</div>
`;

}

// ===== COBRANZA =====
function guardarCobro(){

let eventoSeleccionado = eventos.find(e => String(e.id) === String(eventoSelect.value));

let data = {
id: Date.now(),
evento_id: eventoSelect.value,
evento_nombre: eventoSeleccionado ? eventoSeleccionado.evento : "N/A",
cliente: cliente.value,
monto: num(monto.value),
dias: num(dias.value)
};

cobranza.push(data);
localStorage.setItem("cobranza", JSON.stringify(cobranza));

renderCobro();
}

// ===== ELIMINAR COBRO =====
function eliminarCobro(id){

cobranza = cobranza.filter(c => c.id != id);

localStorage.setItem("cobranza", JSON.stringify(cobranza));

renderCobro();
}
    
function renderCobro(){

let id = eventoSelect.value;

let data = cobranza.filter(c => String(c.evento_id) === String(id));

tablaCobro.innerHTML = `
<tr>
<th>Evento</th>
<th>Cliente</th>
<th>Monto</th>
<th>Días</th>
<th></th>
</tr>
`;

let total = 0;
let vencido = 0;

data.forEach(c=>{

total += c.monto;
if(c.dias > 60) vencido += c.monto;

tablaCobro.innerHTML += `
<tr>
<td>${c.evento_nombre}</td>
<td>${c.cliente}</td>
<td>$${c.monto.toLocaleString()}</td>
<td>${c.dias}</td>
<td><button class="delete" onclick="eliminarCobro(${c.id})">🗑</button></td>
</tr>
`;
});

let porcentaje = total ? (vencido/total)*100 : 0;

kpisCobro.innerHTML = `
<div class="kpi ${porcentaje<=10?'green':'red'}">
% Cartera >60 días: ${porcentaje.toFixed(2)}%
</div>
`;
}

    // ===== EXPORTAR CSV =====
function exportarCSV(){

let data = cobranza;

if(data.length === 0){
alert("No hay datos");
return;
}

// encabezados
let headers = ["Evento","Cliente","Monto","Días"];

// construir CSV
let csv = headers.join(",") + "\n";

data.forEach(c=>{

let row = [
c.evento_nombre,
c.cliente,
c.monto.toLocaleString(),
c.dias
];

csv += row.map(v => `"${v}"`).join(",") + "\n";

});

// descarga
let blob = new Blob([csv], { type: 'text/csv' });
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "cobranza_eventos.csv";
a.click();

}
    
// ===== RENDER TODO =====
function renderTodo(){
renderPipeline();
renderKPIs();
renderCobro();
}

// ===== INIT =====
cargarEventos();
renderTodo();

</script>

</body>
</html>
